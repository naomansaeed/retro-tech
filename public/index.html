<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetoTech - Retro Gadgets Store</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for retro aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Top Banner with Brand Name -->
    <header class="banner">
        <div class="banner-content">
            <h1 class="brand-name">⚡ RETOTECH ⚡</h1>
            <p class="tagline">YOUR SOURCE FOR VINTAGE ELECTRONICS</p>
        </div>
    </header>

    <!-- Main Content - Product Grid -->
    <main class="container">
        <div class="products-grid">
            
            <!-- Product 1 -->
            <article class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1550009158-9ebf69173e03?w=400&h=300&fit=crop" 
                         alt="Vintage Walkman">
                </div>
                <div class="product-info">
                    <h2 class="product-name">SONY WALKMAN WM-2</h2>
                    <p class="product-price">$89.99</p>
                    <a href="#" class="product-link">VIEW DETAILS →</a>
                </div>
            </article>

            <!-- Product 2 -->
            <article class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1589254065878-42c9da997008?w=400&h=300&fit=crop" 
                         alt="Retro Camera">
                </div>
                <div class="product-info">
                    <h2 class="product-name">POLAROID SX-70</h2>
                    <p class="product-price">$249.99</p>
                    <a href="#" class="product-link">VIEW DETAILS →</a>
                </div>
            </article>

            <!-- Product 3 -->
            <article class="product-card">
                <div class="product-image">
                    <img src="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&h=300&fit=crop" 
                         alt="Vintage Game Console">
                </div>
                <div class="product-info">
                    <h2 class="product-name">NINTENDO GAME BOY</h2>
                    <p class="product-price">$129.99</p>
                    <a href="#" class="product-link">VIEW DETAILS →</a>
                </div>
            </article>

        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 RETOTECH. ALL RIGHTS RESERVED.</p>
            <p class="footer-tagline">KEEPING THE RETRO SPIRIT ALIVE</p>
        </div>
    </footer>
</body>
</html>
